doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            User:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/User/Infrastructure/Persistence'
                prefix: 'App\User\Infrastructure\Persistence'
            Auth:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Auth/Infrastructure/Persistence'
                prefix: 'App\Auth\Infrastructure\Persistence'
            Task:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Task/Infrastructure/Persistence'
                prefix: 'App\Task\Infrastructure\Persistence'
            Category:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Category/Infrastructure/Persistence'
                prefix: 'App\Category\Infrastructure\Persistence'
            Goal:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Goal/Infrastructure/Persistence'
                prefix: 'App\Goal\Infrastructure\Persistence'
            Habit:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Habit/Infrastructure/Persistence'
                prefix: 'App\Habit\Infrastructure\Persistence'
            Reminder:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Reminder/Infrastructure/Persistence'
                prefix: 'App\Reminder\Infrastructure\Persistence'
            FinanceCategory:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/FinanceCategory/Infrastructure/Persistence'
                prefix: 'App\FinanceCategory\Infrastructure\Persistence'
            Finance:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Finance/Infrastructure/Persistence'
                prefix: 'App\Finance\Infrastructure\Persistence'
            FinancePlan:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/FinancePlan/Infrastructure/Persistence'
                prefix: 'App\FinancePlan\Infrastructure\Persistence'
            HealthMetricType:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/HealthMetricType/Infrastructure/Persistence'
                prefix: 'App\HealthMetricType\Infrastructure\Persistence'
            HealthMetricEntry:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/HealthMetricEntry/Infrastructure/Persistence'
                prefix: 'App\HealthMetricEntry\Infrastructure\Persistence'
            Telegram:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Telegram/Infrastructure/Persistence'
                prefix: 'App\Telegram\Infrastructure\Persistence'
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
